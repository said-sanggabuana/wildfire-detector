name: GitOps CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax Compilation Check
      run: |
        python -m py_compile src/*.py

    - name: Run Unit Tests
      run: |
        python -m pytest

    - name: Build Docker Image Verification
      run: |
        docker build -t wildfire-detector:latest .
